<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Feliz Dia dos Namorados, Giseli💕</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose: #c0395a;
    --rose-light: #f2c4ce;
    --rose-pale: #fdf0f3;
    --cream: #fff8f9;
    --text: #3a1a22;
    --text-muted: #8a5060;
  }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ---- HERO ---- */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    position: relative;
    background: radial-gradient(ellipse at 50% 0%, #fde8ee 0%, var(--cream) 70%);
  }

  .hero-petals {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .petal {
    position: absolute;
    font-size: 1.4rem;
    opacity: 0.18;
    animation: floatPetal linear infinite;
  }

  @keyframes floatPetal {
    0%   { transform: translateY(-60px) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.18; }
    90%  { opacity: 0.18; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  .eyebrow {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    letter-spacing: 0.25em;
    font-size: 0.75rem;
    color: var(--rose);
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.8rem, 8vw, 5.5rem);
    font-weight: 700;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 0.5rem;
  }

  .hero h1 span {
    color: var(--rose);
    font-style: italic;
  }

  .subtitle {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1rem, 2.5vw, 1.3rem);
    color: var(--text-muted);
    margin-bottom: 3rem;
    max-width: 480px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    background: var(--rose);
    color: #fff;
    font-family: 'Lato', sans-serif;
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    padding: 0.95rem 2.4rem;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    box-shadow: 0 4px 18px rgba(192,57,90,0.28);
  }

  .btn:hover { background: #a82e4a; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(192,57,90,0.36); }
  .btn:active { transform: scale(0.97); }

  .btn-heart {
    font-size: 1.2rem;
    animation: heartbeat 1.2s ease-in-out infinite;
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    20% { transform: scale(1.35); }
    40% { transform: scale(1); }
    60% { transform: scale(1.2); }
  }

  .message-card {
  position: relative;
  z-index: 250;
}

#canvas-layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 300;
}

  /* ---- MESSAGE OVERLAY ---- */
  #message-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: rgba(253, 240, 243, 0.7);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    animation: fadeIn 0.8s ease forwards;
  }

  #message-overlay.show { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .message-card {
    background: #fff;
    border: 1px solid var(--rose-light);
    border-radius: 24px;
    padding: 3rem 3.5rem;
    text-align: center;
    max-width: 480px;
    width: 90%;
    animation: riseUp 0.9s cubic-bezier(0.22,1,0.36,1) forwards;
    position: relative;
  }

  @keyframes riseUp {
    from { opacity: 0; transform: translateY(40px) scale(0.92); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .message-icon {
    font-size: 3rem;
    display: block;
    margin-bottom: 1.2rem;
    animation: heartbeat 1.2s ease-in-out infinite;
  }

  .message-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 700;
    color: var(--rose);
    line-height: 1.25;
    margin-bottom: 0.8rem;
  }

  .message-card p {
    font-size: 0.95rem;
    color: var(--text-muted);
    margin-top: 0.5rem;
  }

  .btn-close {
    margin-top: 2rem;
    display: inline-block;
    background: none;
    border: 1.5px solid var(--rose-light);
    color: var(--rose);
    font-family: 'Lato', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    padding: 0.55rem 1.6rem;
    border-radius: 50px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-close:hover { background: var(--rose-pale); }

  /* ---- DECORATION HEARTS ---- */
  .deco-hearts {
    position: absolute;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 0.4rem;
    font-size: 1rem;
    opacity: 0.35;
  }
</style>
</head>

<section class="hero">
  <div class="hero-petals" id="petals"></div>

  <p class="eyebrow">12 de junho · Dia dos Namorados</p>
  <h1>Para a minha <span>Gi💕</span></h1>
  <p class="subtitle">Cada foto nossa guarda um pedacinho do que sinto por você.</p>

  <button class="btn" id="main-btn">
    <span class="btn-heart">♥</span>
    Clique aqui, meu amor
  </button>

  <div class="deco-hearts">
    <span>♥</span><span>♥</span><span>♥</span><span>♥</span><span>♥</span>
  </div>
</section>

<!-- CANVAS FOR FALLING PHOTOS -->
<canvas id="canvas-layer"></canvas>

<!-- MESSAGE OVERLAY -->
<div id="message-overlay">
  <div class="message-card">
    <span class="message-icon">♥</span>
    <h2>Feliz dia dos namorados meu dengo</h2>
    <p>Com todo o meu amor, sempre.</p>
    <button class="btn-close" id="close-btn">Fechar ♥</button>
  </div>
</div>


<script>
  const photos = [
  "foto1.png.jpeg",
  "foto2.png.jpeg",
  "foto3.png.jpeg",
  "foto4.png.jpeg",
  "foto5.png.jpeg",
  "foto6.png.jpeg",
  "foto7.png.jpeg",
  "foto8.png.jpeg",
  "foto9.png.jpeg",
  "foto10.png.jpeg",
  "foto11.png.jpeg",
  "foto12.png.jpeg",
  "foto13.png.jpeg",
  "foto14.png.jpeg",
  "foto15.png.jpeg"
];

  // ====================================================

  // Pré-carrega todas as imagens
  const loadedImgs = photos.map(src => {
    const img = new Image();
    img.src = src;
    return img;
  });

  // ---- AMBIENT PETALS ----
  const petalContainer = document.getElementById('petals');
  const symbols = ['♥','✿','❀','✦'];
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('span');
    el.className = 'petal';
    el.textContent = symbols[i % symbols.length];
    el.style.left = Math.random() * 100 + '%';
    el.style.fontSize = (0.9 + Math.random() * 1.2) + 'rem';
    el.style.animationDuration = (8 + Math.random() * 14) + 's';
    el.style.animationDelay = (Math.random() * 12) + 's';
    petalContainer.appendChild(el);
  }

  // ---- CANVAS FALLING ----
  const canvas = document.getElementById('canvas-layer');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let animId = null;
  let animating = false;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function spawnParticle(index) {
    const img = loadedImgs[index % loadedImgs.length];
    return {
      x: Math.random() * canvas.width,
      y: -140,
      size: 90 + Math.random() * 80,
      speed: 1.4 + Math.random() * 2.2,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.035,
      sway: Math.random() * 1.8 - 0.9,
      swayFreq: 0.018 + Math.random() * 0.028,
      swayPhase: Math.random() * Math.PI * 2,
      tick: 0,
      img,
      opacity: 0,
    };
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.tick++;
      p.x += Math.sin(p.tick * p.swayFreq + p.swayPhase) * p.sway;
      p.y += p.speed;
      p.rot += p.rotSpeed;
      if (p.opacity < 1) p.opacity = Math.min(1, p.opacity + 0.05);

      ctx.save();
      ctx.globalAlpha = p.opacity;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);

      const w = p.size;
      const ratio = p.img.naturalHeight && p.img.naturalWidth
        ? p.img.naturalHeight / p.img.naturalWidth : 1;
      const h = w * ratio;

      ctx.beginPath();
      ctx.roundRect(-w/2, -h/2, w, h, 12);
      ctx.clip();
      ctx.drawImage(p.img, -w/2, -h/2, w, h);
      ctx.restore();
    });

    particles = particles.filter(p => p.y < canvas.height + 200);
    if (animating || particles.length > 0) animId = requestAnimationFrame(animate);
    else canvas.style.display = 'none';
  }

  let spawnCount = 0;
  let spawnInterval = null;

  function startFalling() {
    resizeCanvas();
    canvas.style.display = 'block';
    particles = [];
    animating = true;
    spawnCount = 0;
    const total = loadedImgs.length * 2; // cada foto cai 2x

    clearInterval(spawnInterval);
    spawnInterval = setInterval(() => {
      if (spawnCount >= total) {
        clearInterval(spawnInterval);
        animating = false;
        return;
      }
      particles.push(spawnParticle(spawnCount));
      spawnCount++;
    }, 150);

    cancelAnimationFrame(animId);
    animate();

    setTimeout(() => {
      document.getElementById('message-overlay').classList.add('show');
    }, 900);
  }

  document.getElementById('main-btn').addEventListener('click', startFalling);

  document.getElementById('close-btn').addEventListener('click', () => {
    document.getElementById('message-overlay').classList.remove('show');
    animating = false;
    clearInterval(spawnInterval);
    setTimeout(() => {
      particles = [];
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      canvas.style.display = 'none';
    }, 500);
  });
</script>
